# ──────────────────────────────────────────────────────────────────────────────
# Publish cgs-rag to PyPI
#
# Triggers: every time a version tag (v*) is pushed to GitHub.
#
# Flow:
#   test job    → runs pytest on Python 3.10 & 3.11
#   publish job → builds wheel + sdist, uploads to PyPI via Trusted Publisher
#                 (no API token needed — uses OIDC identity from GitHub Actions)
#
# One-time PyPI setup (do this once at pypi.org):
#   1. Go to pypi.org → your project → Publishing → Add a publisher
#   2. Publisher type: GitHub Actions
#   3. Owner: Nishant Kumar
#   4. Repository: cgs-rag
#   5. Workflow filename: publish.yml
#   6. Environment name: pypi
# ──────────────────────────────────────────────────────────────────────────────

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"          # triggers on v0.2.0, v1.0.0, etc. — not on every commit

jobs:
  # ── 1. Run tests before publishing ─────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read      # required for actions/checkout on private repos
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── 2. Build and publish to PyPI ────────────────────────────────────────────
  publish:
    name: Build & Publish
    needs: test           # only runs if tests pass
    runs-on: ubuntu-latest
    environment: pypi     # matches the environment name you set on pypi.org

    # Required for Trusted Publisher (OIDC) — no API token needed
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and source distribution
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No username/password needed — Trusted Publisher handles auth via OIDC
